name: researchhub

services:
  app:
    build: .
    container_name: researchhub-app
    restart: unless-stopped
    environment:
      APP_NAME: ResearchHub
      APP_ENV: local
      APP_KEY: base64:rRlGxxED9jGe1SL8tqSiF88I3Wwy5R7JWtiJB/i/tMY=
      APP_DEBUG: "true"
      APP_TIMEZONE: UTC
      APP_URL: http://localhost:4000
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      APP_MAINTENANCE_DRIVER: file
      BCRYPT_ROUNDS: "12"
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_DEPRECATIONS_CHANNEL: "null"
      LOG_LEVEL: debug
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: researchhub
      DB_USERNAME: researchhub
      DB_PASSWORD: researchhub_secret
      SESSION_DRIVER: database
      SESSION_LIFETIME: "20"
      SESSION_ENCRYPT: "true"
      SESSION_PATH: /
      SESSION_DOMAIN: "null"
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: researchhub_
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      MAIL_MAILER: log
    volumes:
      - ./backend:/var/www/html
      - ./testing/tests:/var/www/html/tests
    networks:
      - researchhub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: researchhub-nginx
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - researchhub
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: researchhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchhub
      POSTGRES_USER: researchhub
      POSTGRES_PASSWORD: researchhub_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - researchhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchhub -d researchhub"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: researchhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - researchhub
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  queue:
    build: .
    container_name: researchhub-queue
    restart: unless-stopped
    environment:
      APP_NAME: ResearchHub
      APP_ENV: local
      APP_KEY: base64:rRlGxxED9jGe1SL8tqSiF88I3Wwy5R7JWtiJB/i/tMY=
      APP_DEBUG: "true"
      APP_TIMEZONE: UTC
      APP_URL: http://localhost:4000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: researchhub
      DB_USERNAME: researchhub
      DB_PASSWORD: researchhub_secret
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: researchhub_
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: debug
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - ./backend:/var/www/html
    networks:
      - researchhub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    container_name: researchhub-scheduler
    restart: unless-stopped
    environment:
      APP_NAME: ResearchHub
      APP_ENV: local
      APP_KEY: base64:rRlGxxED9jGe1SL8tqSiF88I3Wwy5R7JWtiJB/i/tMY=
      APP_DEBUG: "true"
      APP_TIMEZONE: UTC
      APP_URL: http://localhost:4000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: researchhub
      DB_USERNAME: researchhub
      DB_PASSWORD: researchhub_secret
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      CACHE_PREFIX: researchhub_
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: "null"
      REDIS_PORT: "6379"
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: debug
    command: ["sh", "-c", "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./backend:/var/www/html
    networks:
      - researchhub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  researchhub:
    driver: bridge

volumes:
  pgdata:
    driver: local
